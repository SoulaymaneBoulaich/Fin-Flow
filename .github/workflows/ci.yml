name: FinFlow CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Optional: In a full CI setup, you could start Docker services here.
      # Since we mock connections during integration and unit testing,
      # we can run tests rapidly in a pure Python runner without docker overhead.
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: finflow_app
          POSTGRES_USER: finflow
          POSTGRES_PASSWORD: FinFlow_PG_2024!
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install loguru pydantic fastapi httpx pyarrow numpy minio sqlalchemy psycopg2-binary tenacity requests cryptography pytest pytest-asyncio

    - name: Run Test Suite
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        MINIO_ENDPOINT: http://localhost:9000
        KAFKA_BROKERS: localhost:9092
      run: |
        python -m pytest tests/ -v --tb=short
