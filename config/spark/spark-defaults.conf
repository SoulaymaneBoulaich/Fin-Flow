# ─────────────────────────────────────────────────────────────────────────────
# Spark Default Configuration
# ─────────────────────────────────────────────────────────────────────────────

# Master
spark.master                            spark://spark-master:7077

# Memory
spark.driver.memory                     2g
spark.executor.memory                   2g
spark.executor.cores                    2
spark.driver.maxResultSize              1g

# Serialization
spark.serializer                        org.apache.spark.serializer.KryoSerializer

# SQL
spark.sql.extensions                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.finflow               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.finflow.type          hive
spark.sql.catalog.finflow.uri           thrift://hive-metastore:9083
spark.sql.catalog.finflow.warehouse     s3a://finflow/warehouse
spark.sql.catalog.spark_catalog         org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type    hive

# S3A (MinIO) Configuration
spark.hadoop.fs.s3a.endpoint            http://minio:9000
spark.hadoop.fs.s3a.access.key          finflow_admin
spark.hadoop.fs.s3a.secret.key          FinFlow_Secret_2024!
spark.hadoop.fs.s3a.path.style.access   true
spark.hadoop.fs.s3a.impl                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled  false

# Kafka
spark.jars.packages                     org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.postgresql:postgresql:42.7.3

# Hive
spark.hadoop.hive.metastore.uris        thrift://hive-metastore:9083

# UI
spark.ui.port                           4040

# Shuffle
spark.sql.shuffle.partitions            50
spark.default.parallelism               10

# Checkpointing
spark.sql.streaming.checkpointLocation  s3a://finflow/checkpoints

# Adaptive Query Execution
spark.sql.adaptive.enabled              true
spark.sql.adaptive.coalescePartitions.enabled true
